<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 - TECH ZONE</title>
    <link rel="icon" type="image/png" href="../images/logo/f1-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/techzone.css">
</head>
<body>

    <header class="main-header">
        <div class="logo"> <img src="../images/logo/f1-logo.png" alt="F1 Logo">F1 - HOME OF MOTORSPORT</div>
        <nav class="navbar">
            <a href="../">HOME</a>
            <a href="results.html">RESULTS</a>
            <a href="standings.html">STANDINGS</a> 
            <a href="calendar.html">CALENDAR</a>
            <a href="telemetry.html" class="active">TECH ZONE</a>
            <a href="archive.html">ARCHIVE</a>
        </nav>
    </header>

    <div class="techzone-navigation-bar">
        <button class="nav-tab active" data-category="monopost">MONOPOST ANALYSIS</button>
        <button class="nav-tab" data-category="tires">TYRE SPECIFICATIONS</button>
        <button class="nav-tab" data-category="flags">MARSHAL SIGNALS</button>
    </div>

    <main class="immersive-theatre-viewport">
        
        <div class="blueprint-fade-wrapper">
            <div class="interactive-stage-core">
                <img src="../images/monopost/mono1.avif" id="mainShowcaseAsset" alt="F1 Technical Draft">
                <div id="canvasHotspotOverlay"></div>
            </div>
        </div>

        <div class="liquid-glass-modal" id="liquidModal">
            <button class="liquid-close-btn" id="closeLiquidModal" aria-label="Close details">×</button>
            <span class="liquid-tag" id="modalTag">FIA REGULATION</span>
            <h2 class="liquid-title" id="modalTitle">Component Detail</h2>
            <p class="liquid-desc" id="modalDesc">Select any interactive system node to initialize stream telemetry data.</p>
        </div>

        <div class="hud-floating-controller" id="monopostControls">
            <button class="hud-nav-arrow" id="btnPrevAsset">←</button>
            <div class="hud-center-identity">
                <span id="hudAssetCounter">01 // 08</span>
                <h1 id="hudAssetTitle">Front Wing Morphology</h1>
            </div>
            <button class="hud-nav-arrow" id="btnNextAsset">→</button>
        </div>

    </main>

    <footer class="main-footer">
        <p>&copy; 2026 F1 - HOME OF MOTORSPORT </p>
    </footer>

    <script src="../script/techzone.js"></script>
</body>
</html>
